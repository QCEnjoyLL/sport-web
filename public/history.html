<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>训练记录 · PULSE 每日训练</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/base.css?v=20260624-2" />
  <link rel="stylesheet" href="/assets/css/components.css?v=20260624-2" />
  <link rel="stylesheet" href="/assets/css/fontawesome-6.5.1-local.css" />
  <link rel="stylesheet" href="/assets/css/home.css?v=20260624-2" />
  <link rel="stylesheet" href="/assets/css/history.css?v=20260624-2" />
</head>
<body>
  <div id="nav"></div>

  <main>
    <!-- 月份切换 + 统计 -->
    <section class="section" style="padding-bottom:0">
      <div class="container">
        <div class="history-toolbar">
          <button class="icon-btn" id="prevMonth"><i class="fa-solid fa-chevron-left"></i></button>
          <div class="history-month" id="monthLabel">—</div>
          <button class="icon-btn" id="nextMonth"><i class="fa-solid fa-chevron-right"></i></button>
          <button class="btn btn-ghost btn-sm" id="backToday" title="回到今日" style="margin-left:12px;display:none">
            <i class="fa-solid fa-calendar-day"></i> 回到今日
          </button>
        </div>
        <div class="history-stats" id="historyStats">
          <div class="history-stat"><div class="history-stat-num" id="statDays">0</div><div class="history-stat-label">训练天数</div></div>
          <div class="history-stat"><div class="history-stat-num" id="statCompleted">0</div><div class="history-stat-label">完成次数</div></div>
          <div class="history-stat"><div class="history-stat-num" id="statMinutes">0</div><div class="history-stat-label">总分钟</div></div>
          <div class="history-stat"><div class="history-stat-num" id="statStreak">0</div><div class="history-stat-label">连续打卡</div></div>
        </div>
      </div>
    </section>

    <!-- 日历 -->
    <section class="section" style="padding-top:0;padding-bottom:0">
      <div class="container">
        <div class="history-calendar" id="calendarGrid"></div>
      </div>
    </section>

    <!-- 时间线 -->
    <section class="section" style="padding-top:0;padding-bottom:0">
      <div class="container">
        <div class="history-timeline" id="timeline">
          <div class="history-loading">加载中...</div>
        </div>
        <div class="history-empty" id="historyEmpty" style="display:none">
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <h3>还没有训练记录</h3>
            <p>开始你的第一次训练吧</p>
            <a href="/" class="btn btn-primary"><i class="fa-solid fa-play"></i> 去训练</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 删除确认弹窗 -->
  <div class="modal-mask" id="deleteMask">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">删除训练记录</div>
        <button class="modal-close" id="deleteClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p>确定要删除这条训练记录吗？此操作不可撤销。</p>
        <p style="font-size:13px;color:var(--text-dim);margin-top:8px" id="deleteHint"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="deleteCancel">取消</button>
        <button class="btn btn-danger" id="deleteConfirm"><i class="fa-solid fa-trash"></i> 删除</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/utils.js?v=20260624-2"></script>
  <script src="/assets/js/api.js?v=20260624-2"></script>
  <script src="/assets/js/auth.js?v=20260624-2"></script>
  <script src="/assets/js/history-page.js?v=20260624-2"></script>
</body>
</html>
