<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理 · PULSE 每日训练</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/base.css?v=20260624-2" />
  <link rel="stylesheet" href="/assets/css/components.css?v=20260624-2" />
  <link rel="stylesheet" href="/assets/css/fontawesome-6.5.1-local.css" />
  <link rel="stylesheet" href="/assets/css/admin.css?v=20260624-2" />
</head>
<body>
  <div id="nav"></div>

  <section class="admin-head">
    <div class="container">
      <div class="admin-title-block">
        <h1>训练库 <span class="accent">管理</span></h1>
        <p>添加、编辑你的训练视频</p>
      </div>
      <div class="admin-head-actions">
        <button class="btn btn-primary" id="addBtn">
          <i class="fa-solid fa-plus"></i> 添加视频
        </button>
        <button class="btn btn-accent" id="batchAddBtn">
          <i class="fa-solid fa-layer-group"></i> 批量添加
        </button>
        <button class="btn btn-accent" id="batchManageBtn">
          <i class="fa-solid fa-list-check"></i> 批量管理
        </button>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:8px">
    <div class="container">
      <div class="admin-hint" id="firstHint" style="display:none">
        <i class="fa-solid fa-circle-info"></i>
        <span>欢迎！点击右上角"添加视频"，填入 OpenList 或其它可播放的视频直链即可开始训练。</span>
      </div>
      <div class="admin-list" id="adminList">
        <!-- 骨架 -->
      </div>
    </div>
  </section>

  <script src="/assets/js/utils.js?v=20260624-2"></script>
  <script src="/assets/js/api.js?v=20260624-2"></script>
  <script src="/assets/js/auth.js?v=20260624-2"></script>
  <script src="/assets/js/admin.js?v=20260624-2"></script>
</body>
</html>
